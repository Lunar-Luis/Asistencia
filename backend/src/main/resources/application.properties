spring.application.name=backend
# CONFIGURACI”N DEL SERVIDOR
server.port=8080

# CONFIGURACI”N DE BASE DE DATOS POSTGRESQL
spring.datasource.url=jdbc:postgresql://localhost:5432/bd_asistencia
spring.datasource.username=postgres
# AQUÕ VA LA CONTRASE—A QUE CREASTE AL REINSTALAR POSTGRESQL
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# CONFIGURACI”N DE JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# CLAVE SECRETA PARA JWT (Debe ser larga y compleja en producciÛn)
jwt.secret=UnaClaveSuperSecretaParaFirmarLosTokensDelSistemaDeAsistencia2026
jwt.expiration=86400000